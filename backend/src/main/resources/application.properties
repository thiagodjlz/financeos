quarkus.application.name=financeos-backend
quarkus.http.port=8080
quarkus.http.root-path=/api

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
quarkus.http.cors.methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=16

# URL/credenciais explicitas apenas em dev e prod. O perfil test nao define
# nenhuma delas de proposito: isso faz o Quarkus Dev Services subir um Postgres
# efemero (Testcontainers) so para os testes, em vez de aplicar migrations no
# banco de dev do docker-compose como efeito colateral de rodar `mvnw test`.
%dev,prod.quarkus.datasource.username=${POSTGRES_USER:financeos}
%dev,prod.quarkus.datasource.password=${POSTGRES_PASSWORD:financeos_dev_password}
%dev,prod.quarkus.datasource.jdbc.url=${JDBC_URL:jdbc:postgresql://localhost:5432/financeos}
%test.quarkus.datasource.devservices.db-name=financeos

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/docs

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://financeos.local/issuer
smallrye.jwt.sign.key.location=privateKey.pem
