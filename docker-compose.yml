services:
  postgres:
    image: postgres:16-alpine
    container_name: financeos-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: America/Sao_Paulo
      POSTGRES_DB: ${POSTGRES_DB:-financeos}
      POSTGRES_USER: ${POSTGRES_USER:-financeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeos_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - financeos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    image: financeos-backend:${APP_VERSION:-dev}
    container_name: financeos-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-financeos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeos_dev_password}
      JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-financeos}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    image: financeos-frontend:${APP_VERSION:-dev}
    container_name: financeos-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  financeos_postgres_data:
